<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB APPLICATION FORM</title>
</head>

<body>
    <h2>JOB APPLICATION FORM</h2>
    <form>
        <!-- Full name -->
        <label for="fullName">Full Name:</label>
        <input id="fullName" type="text" placeholder="eg: Raju P" name="fullName" required minlength="3" maxlength="10">
        <br>
        <!-- email -->
        <label for="email">Email:</label>
        <input id="email" type="email" name="email" placeholder="your mail id" required>
        <br>
        <!-- Gender  -->
        <p>select your Gender</p>
        <input id="male" type="radio" name="gender" value="male">
        <label for="male">Male</label>
        <br>
        <input id="female" type="radio" name="gender" value="female">
        <label for="female">Female</label>

        <br>
        <!-- position -->
        <label for="position">Position:</label>
        <select name="position" id="position">
            <option value="">Select your position</option>
            <option value="front-end">Front-end</option>
            <option value="back-end">Back-end</option>
            <option value="ui">UI/uX</option>
        </select>
        <br>
        <!-- Resume upload -->
        <label for="resume">upload your Resume:</label>
        <input type="file" name="resume" id="resume" accept=".pdf,.doc">
         <br>
        <!-- Experiance -->
        <label for="exp">Experiance:</label>
        <input type="number" id="exp" min="0" max="10">
        <button type="submit">submit</button>
    </form>
    <hr>
</body>


<!-- {

</html>
