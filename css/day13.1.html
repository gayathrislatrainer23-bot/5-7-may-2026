<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        /* reset */
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        .navbar{
            height: 60px;
            background-color: black;
            display: flex;
             justify-content: space-between;
             align-items: center;
            

        }
        .logo img{
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;

        }
        .menu{
             margin: 5px;
        }
        .menu a{
            text-decoration: none;
            color: #ffff;
        }
        .menu ul{
            display: flex;
            list-style: none;
            gap:10px
        }

    </style>
</head>
<body>
    <nav class="navbar">
       <div class="logo">
  <img src="https://img.magnific.com/premium-vector/eqh-logo-design-initial-letter-eqh-monogram-logo-using-hexagon-shape_1101554-16445.jpg?semt=ais_hybrid&w=740&q=80" alt="logo">
       </div> 
       <div class="menu">
<ul>
    <li><a href="#">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="">Contact</a></li>
    <li><a href="">SignIn</a></li>
    
</ul>
       </div>
    </nav>
    <div class="container">

    </div>
</body>
</html>
