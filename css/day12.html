<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display: block,inline</title>
    <style>
        .block-box {
            background-color: rgb(128, 49, 0);
            display: block;
            width: 200px;
            height: 200px;

        }

        .inline-box {
            background-color: rgb(41, 128, 0);
            display: inline;
            /* height: 200px;
            width: 1000px; */
        }

        .block-inline {
            background-color: rgb(208, 229, 17);
            display: inline-block;
            height: 200px;
            width: 100px;
            margin: 5px;
            text-shadow: 5px 5px 5px rgb(199, 111, 111);
            box-shadow: 5px 5px 5px gray;
        }
      .block-inline  img{
        width: 50px;
        height: 50px;
        object-fit: cover;

      }
    </style>
</head>

<body>
    <div class="block-box">
        block box
    </div>

    <!-- inline -->
    <div class="inline-box">
        inline-box
    </div>
    <div class="inline-box">
        inline-box
    </div>
    <br>
    <br>
    <!-- block-inline -->
    <div class="block-inline">
        <!-- <img src="/document/image1.avif" alt=""> -->
        block-inline
    </div>
    <div class="block-inline">
        block-inline
    </div>
</body>

</html>
