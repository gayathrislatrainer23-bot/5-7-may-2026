<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button {
            background-color: black;
            color: antiquewhite;
            padding: 12px 25px;
            border: none;
            font-size: 18px;
            border-radius: 15px;
            cursor: pointer;
            transition: 2s;
        }

        button:hover {
            
            color: black;
            box-shadow: 3px 3px 3px grey; 
            background-color: red;
            transform: scale(.5)
        }
    </style>
</head>

<body>
    <button>click</button>
</body>

</html>
