<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;;
            padding: 0;
        }
        .container {
          display: flex;
          height: 500px; 
          width: 100%;
          background-color: rgb(125, 157, 128);
   /* flex-direction:column; */
   justify-content:space-between; 
    /* horzotal alignment control  */
   align-items:center;



        }
        .box{
            width: 200px;
            height: 100px;
            background-color: blueviolet;
           
        }
        @media(max-width: 768px){
                .box{

                    background-color: rgb(41, 175, 63);
                }



        }
        @media (min-width: 769px) and (max-width:1000px ){
           .box{
            color: brown;
           } 

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">Home</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
</body>
</html>
